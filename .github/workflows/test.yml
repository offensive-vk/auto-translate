name: CI / Action

on:
  workflow_dispatch:
  push:
    branches: ['use']

env:
  repo-token: ${{ secrets.BOT_TOKEN }}

jobs:
  test:
    strategy:
      matrix:
        lang: ['es', 'ru', 'fr', 'zh-CN', 'ar', 'de', 'hi']

    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Translate Readme
        uses: ./
        with:
          repo-token: ${{ secrets.BOT_TOKEN || secrets.GITHUB_TOKEN }}
          file: "README.md"
          language: ${{ matrix.lang }}

      - name: Commit and Push
        uses: offensive-vk/auto-commit-push@master
        with: 
          branch: 'use'
          name: 'TheHamsterBot'
          email: 'TheHamsterBot@outlook.com'
          github-token: ${{ secrets.BOT_TOKEN }}
          message: 'CI: Translated Markdown ${{ matrix.lang }} File.'
        
      - name: Wait
        run: echo "Please wait..... " && sleep 5